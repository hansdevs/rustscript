  var about_p1 = "RustScript is a new programming language and compiler that lets you build web pages by writing HTML, CSS, and Python-style logic together in a single .rsx file. Built from scratch in Rust with zero dependencies, the compiler runs a complete pipeline — lexing, parsing, AST construction, and code generation — to output a self-contained HTML page with embedded CSS and JavaScript.";
  var about_p2 = "The language combines clean, Python-like syntax (variables, functions, recursion, loops, conditionals, lists, and string interpolation) with JSX-style UI markup for interface layout, plus inline styling powered by 60+ CSS shorthand properties. RustScript includes cross-file imports with circular dependency protection, a tree-walking interpreter for running scripts in the terminal, a built-in HTTP dev server with live reload, and a VS Code extension for syntax highlighting.";
  var about_p3 = "It's Turing-complete — shown through classic programs like recursion demos, FizzBuzz, and Fibonacci — and it's built around a simple idea: write one file, run one command, and get a working webpage with no frameworks, bundlers, or configuration.";
  var feature_count = 6;
  var f1_title = "Python-Like Syntax";
  var f1_desc = "Variables, functions, loops, conditionals. If you know Python, you already know RustScript.";
  var f1_tag = "let x = 10";

  var f2_tag = "page { div { } }";
